name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -d tests ]; then pip install pytest; fi

      - name: Compile Python files (app/scripts/tests)
        run: |
          paths="app scripts"
          if [ -d tests ]; then paths="$paths tests"; fi
          python -m compileall $paths

      - name: Run tests
        if: ${{ hashFiles('tests/**') != '' }}
        run: python -m pytest -q

      - name: Skip tests (none present)
        if: ${{ hashFiles('tests/**') == '' }}
        run: echo "No tests directory present"

      - name: Run evaluation
        if: ${{ hashFiles('scripts/run_eval.py') != '' }}
        run: python scripts/run_eval.py

      - name: Skip evaluation (no runner)
        if: ${{ hashFiles('scripts/run_eval.py') == '' }}
        run: echo "No evaluation runner present"
