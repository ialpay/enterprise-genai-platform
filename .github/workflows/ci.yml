name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -d tests ]; then pip install pytest; fi

      - name: Compile Python files
        run: |
          python -m compileall app scripts

      - name: Run tests if present
        run: |
          if [ -d tests ]; then python -m pytest -q; else echo "No tests directory present"; fi

      - name: Run evaluation if present
        run: |
          if [ -f scripts/run_eval.py ]; then python scripts/run_eval.py; else echo "No evaluation runner present"; fi